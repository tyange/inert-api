name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Create .env
        run: |
          cat <<EOF > /tmp/.env
          PORT=${{ secrets.PORT }}
          BASE_URL=${{ secrets.BASE_URL }}
          DATABASE_PATH=${{ secrets.DATABASE_PATH }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_ENDPOINT_URL=${{ secrets.AWS_ENDPOINT_URL }}
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          CDN_BASE_URL=${{ secrets.CDN_BASE_URL }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          UPLOAD_MAX_BYTES=${{ secrets.UPLOAD_MAX_BYTES }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          EOF

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          DEPLOY_DIR=$(dirname $DEPLOY_PATH)
          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            /tmp/.env \
            $USER@$HOST:$DEPLOY_DIR/.env
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            $USER@$HOST \
            "sudo systemctl stop inert-api"
          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            target/release/inert-api \
            $USER@$HOST:$DEPLOY_PATH
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            $USER@$HOST \
            "sudo systemctl start inert-api && sudo systemctl status inert-api --no-pager"
          rm /tmp/deploy_key /tmp/.env
